spring:
  application:
    name: station-service
  datasource:
    # Đọc biến DB_HOST trên Cloud, nếu không có thì xài mặc định là mysql_station (ở local)
    url: jdbc:mysql://${DB_HOST:mysql_station}:${DB_PORT:3306}/${DB_NAME:station_service}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8084


tomtom:
