spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql_user}:${DB_PORT:3306}/${DB_NAME:user_service}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

server:
  port: 8081