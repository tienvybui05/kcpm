name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: Build and Analyze
    runs-on: ubuntu-latest

    steps:

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      #########################################################
      # Battery Service
      #########################################################

      - name: Build battery-service
        working-directory: backend/battery-service
        run: |
          chmod +x mvnw
          ./mvnw clean verify

      #########################################################
      # User Service
      #########################################################

      - name: Build user-service
        working-directory: backend/user-service
        run: |
          chmod +x mvnw
          ./mvnw clean verify

      #########################################################
      # Subscription Service
      #########################################################

      - name: Build subscription-service
        working-directory: backend/subscription-service
        run: |
          chmod +x mvnw
          ./mvnw clean verify

      #########################################################
      # Station Service
      #########################################################

      - name: Build station-service
        working-directory: backend/station-service
        run: |
          chmod +x mvnw
          ./mvnw clean verify

      #########################################################
      # Transaction Service
      #########################################################

      - name: Build transaction-service
        working-directory: backend/transaction-service
        run: |
          chmod +x mvnw
          ./mvnw clean verify

      #########################################################
      # Feedback Service
      #########################################################

      - name: Build feedback-service
        working-directory: backend/feedback-service
        run: |
          chmod +x mvnw
          ./mvnw clean verify

      #########################################################
      # SonarCloud Scan
      #########################################################

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}